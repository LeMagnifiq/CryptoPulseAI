<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoPulseAI - Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #1e1e2f, #2a2a4a);
            color: #ffffff;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
        }
        h1 {
            font-size: 3rem;
            color: #00d4ff;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
            margin-bottom: 20px;
        }
        p {
            font-size: 1.2rem;
            font-weight: 300;
            margin-bottom: 30px;
            color: #e0e0e0;
        }
        .links a {
            color: #00d4ff;
            text-decoration: none;
            font-weight: 400;
            margin: 0 15px;
            transition: color 0.3s;
        }
        .links a:hover {
            color: #00ff88;
            text-decoration: underline;
        }
        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            p { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to CryptoPulseAI</h1>
        <p>Explore cryptocurrency price predictions and market trends with advanced analytics.</p>
        <div class="links">
            <a href="/prices">View Prices</a> | <a href="/predictions">View Predictions</a>
        </div>
    </div>
</body>
</html>
