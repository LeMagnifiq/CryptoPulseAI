<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoPulseAI - Predictions</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #1e1e2f, #2a2a4a);
            color: #ffffff;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 30px;
            color: #00d4ff;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }
        .prediction-box {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            margin: 15px 0;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s;
        }
        .prediction-box:hover {
            transform: translateY(-5px);
        }
        .model {
            font-weight: 600;
            color: #00d4ff;
        }
        .prediction-rise {
            color: #00ff88;
            font-weight: 600;
        }
        .prediction-fall {
            color: #ff4d4d;
            font-weight: 600;
        }
        p {
            font-size: 1.2rem;
            margin: 10px 0;
        }
        .links {
            text-align: center;
            margin-top: 30px;
        }
        .links a {
            color: #00d4ff;
            text-decoration: none;
            font-weight: 400;
            margin: 0 15px;
            transition: color 0.3s;
        }
        .links a:hover {
            color: #00ff88;
            text-decoration: underline;
        }
        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            p { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Price Predictions</h1>
        {% for coin, pred in predictions.items() %}
        <div class="prediction-box">
            <p><span class="model">{{ coin_map[coin] }} (RandomForest)</span>: Price will <strong class="prediction-{{ pred.rf }}">{{ pred.rf }}</strong> tomorrow.</p>
            <p><span class="model">{{ coin_map[coin] }} (XGBoost)</span>: Price will <strong class="prediction-{{ pred.xgb }}">{{ pred.xgb }}</strong> tomorrow.</p>
        </div>
        {% endfor %}
        <div class="links">
            <a href="/prices">View Prices</a> | <a href="/">Home</a>
        </div>
    </div>
</body>
</html>
