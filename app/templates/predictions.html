<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoPulseAI - Predictions</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0d1b2a, #1b263b);
            color: #e0e0e0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            font-size: 2.8rem;
            margin-bottom: 30px;
            color: #00d4ff;
            text-shadow: 0 0 12px rgba(0, 212, 255, 0.4);
            font-weight: 700;
        }
        .prediction-table {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            margin-bottom: 40px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 15px;
            text-align: left;
            font-size: 1rem;
        }
        th {
            background: rgba(0, 212, 255, 0.1);
            color: #00d4ff;
            font-weight: 600;
        }
        td {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-weight: 300;
        }
        .rise {
            color: #00ff88;
            display: flex;
            align-items: center;
        }
        .fall {
            color: #ff4d4d;
            display: flex;
            align-items: center;
        }
        .rise::before, .fall::before {
            content: '';
            display: inline-block;
            width: 10px;
            height: 10px;
            margin-right: 8px;
            background-size: contain;
        }
        .rise::before {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%2300ff88"><path d="M12 2l10 10H2l10-10z"/></svg>');
        }
        .fall::before {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23ff4d4d"><path d="M12 22L2 12h20l-10 10z"/></svg>');
        }
        tr:hover {
            background: rgba(0, 212, 255, 0.05);
            transition: background 0.3s;
        }
        .links {
            text-align: center;
            margin-top: 30px;
        }
        .links a {
            color: #00d4ff;
            text-decoration: none;
            font-weight: 400;
            margin: 0 15px;
            transition: color 0.3s;
        }
        .links a:hover {
            color: #00ff88;
        }
        @media (max-width: 768px) {
            h1 { font-size: 2.2rem; }
            table { font-size: 0.9rem; }
            th, td { padding: 10px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Price Predictions</h1>
        <div class="prediction-table">
            <table>
                <tr>
                    <th>Coin</th>
                    <th>Symbol</th>
                    <th>RandomForest</th>
                    <th>XGBoost</th>
                </tr>
                {% for coin, pred in predictions.items() %}
                <tr>
                    <td>{{ coin.capitalize() }}</td>
                    <td>{{ coin_map[coin] }}</td>
                    <td class="{{ pred.rf }}">{{ pred.rf.capitalize() }}</td>
                    <td class="{{ pred.xgb }}">{{ pred.xgb.capitalize() }}</td>
                </tr>
                {% endfor %}
            </table>
        </div>
        <div class="links">
            <a href="/prices">View Prices</a> | <a href="/">Home</a>
        </div>
    </div>
</body>
</html>
