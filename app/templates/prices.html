<!DOCTYPE html>
<html>
<head>
    <title>CryptoPulseAI - Prices</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f9f9f9; }
        h1, h2 { color: #333; text-align: center; }
        table { border-collapse: collapse; width: 100%; max-width: 600px; margin: 20px auto; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .positive { color: green; }
        .negative { color: red; }
        .chart-container { max-width: 800px; margin: 20px auto; padding: 10px; }
        .links { text-align: center; margin-top: 20px; }
        a { color: #007bff; text-decoration: none; margin: 0 10px; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>Crypto Prices</h1>
    <table>
        <tr>
            <th>Coin</th>
            <th>Symbol</th>
            <th>Price (USD)</th>
            <th>24h Change (%)</th>
        </tr>
        {% for coin in prices %}
        <tr>
            <td>{{ coin.name }}</td>
            <td>{{ coin.symbol }}</td>
            <td>{{ coin.price }}</td>
            <td class="{% if coin.change_24h != 'N/A' and coin.change_24h >= 0 %}positive{% else %}negative{% endif %}">
                {{ coin.change_24h }}
            </td>
        </tr>
        {% endfor %}
    </table>

    <h2>Price Trends (Last 7 Days)</h2>
    <div class="chart-container">
        <canvas id="priceChart"></canvas>
    </div>

    <h2>RSI (Last 7 Days)</h2>
    <div class="chart-container">
        <canvas id="rsiChart"></canvas>
    </div>

    <h2>Volume (Last 7 Days)</h2>
    <div class="chart-container">
        <canvas id="volumeChart"></canvas>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const coinColors = {
            'bitcoin': '#f7931a',
            'ethereum': '#627eea',
            'solana': '#00ffa3',
            'cardano': '#0033ad',
            'dogecoin': '#c2a633'
        };

        // Price Chart
        const priceCtx = document.getElementById('priceChart').getContext('2d');
        new Chart(priceCtx, {
            type: 'line',
            data: {
                labels: ['Day -7', 'Day -6', 'Day -5', 'Day -4', 'Day -3', 'Day -2', 'Day -1'],
                datasets: [
                    {% for coin, prices in chart_data.price.items() %}
                    {
                        label: '{{ coin_map[coin] }}',
                        data: {{ prices | tojson }},
                        borderColor: coinColors['{{ coin }}'],
                        fill: false
                    }{% if not loop.last %},{% endif %}
                    {% endfor %}
                ]
            },
            options: {
                scales: {
                    y: { beginAtZero: false, title: { display: true, text: 'Price (USD)' } },
                    x: { title: { display: true, text: 'Date' } }
                }
            }
        });

        // RSI Chart
        const rsiCtx = document.getElementById('rsiChart').getContext('2d');
        new Chart(rsiCtx, {
            type: 'line',
            data: {
                labels: ['Day -7', 'Day -6', 'Day -5', 'Day -4', 'Day -3', 'Day -2', 'Day -1'],
                datasets: [
                    {% for coin, rsi in chart_data.rsi.items() %}
                    {
                        label: '{{ coin_map[coin] }}',
                        data: {{ rsi | tojson }},
                        borderColor: coinColors['{{ coin }}'],
                        fill: false
                    }{% if not loop.last %},{% endif %}
                    {% endfor %}
                ]
            },
            options: {
                scales: {
                    y: { beginAtZero: false, title: { display: true, text: 'RSI' } },
                    x: { title: { display: true, text: 'Date' } }
                }
            }
        });

        // Volume Chart
        const volumeCtx = document.getElementById('volumeChart').getContext('2d');
        new Chart(volumeCtx, {
            type: 'bar',
            data: {
                labels: ['Day -7', 'Day -6', 'Day -5', 'Day -4', 'Day -3', 'Day -2', 'Day -1'],
                datasets: [
                    {% for coin, volume in chart_data.volume.items() %}
                    {
                        label: '{{ coin_map[coin] }}',
                        data: {{ volume | tojson }},
                        backgroundColor: coinColors['{{ coin }}'],
                    }{% if not loop.last %},{% endif %}
                    {% endfor %}
                ]
            },
            options: {
                scales: {
                    y: { beginAtZero: true, title: { display: true, text: 'Volume (USD)' } },
                    x: { title: { display: true, text: 'Date' } }
                }
            }
        });
    </script>

    <div class="links">
        <a href="/predictions">View Predictions</a> | <a href="/">Home</a>
    </div>
</body>
</html>
